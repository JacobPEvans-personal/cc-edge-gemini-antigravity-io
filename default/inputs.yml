inputs:
  gemini-cli-sessions:
    disabled: true
    sendToRoutes: true
    pqEnabled: false
    streamtags: []
    mode: manual
    interval: 30
    filenames:
      - "*session-*.json"
      - "*session-*.jsonl"
    filterArchivedFiles: false
    tailOnly: true
    idleTimeout: 300
    checkFileModTime: true
    forceText: false
    hashLen: 256
    staleChannelFlushMs: 10000
    suppressMissingPathErrors: false
    deleteFiles: false
    saltHash: false
    includeUnidentifiableBinary: false
    recurse: true
    type: file
    path: "$GEMINI_HOME/.gemini/tmp"
    metadata:
      - name: datatype
        value: "'gemini-cli-session'"

